<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epsylon Web</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Task API Client</p>
          <h1>Epsylon</h1>
        </div>

        <section class="connection-panel" aria-labelledby="connection-title">
          <h2 id="connection-title">API</h2>
          <label for="api-url">Base URL</label>
          <div class="url-row">
            <input id="api-url" type="url" value="http://127.0.0.1:8000" />
            <button id="save-api-url" type="button" title="Save API URL">Save</button>
          </div>
          <p id="api-status" class="status-pill">Checking</p>
        </section>

        <nav class="filters" aria-label="Task filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="open">Open</button>
          <button class="filter-button" type="button" data-filter="done">Done</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2>Tasks</h2>
          </div>
          <button id="refresh-tasks" class="icon-button" type="button" title="Refresh tasks" aria-label="Refresh tasks">
            <span aria-hidden="true">Refresh</span>
          </button>
        </header>

        <section class="task-form-section" aria-labelledby="new-task-title">
          <h3 id="new-task-title">New Task</h3>
          <form id="task-form" class="task-form">
            <input id="task-title" name="title" type="text" maxlength="80" placeholder="Title" required />
            <textarea id="task-description" name="description" maxlength="300" placeholder="Description"></textarea>
            <button type="submit">Create</button>
          </form>
        </section>

        <section class="task-list-section" aria-live="polite">
          <div class="list-header">
            <h3 id="task-count">0 tasks</h3>
            <p id="message" class="message"></p>
          </div>
          <div id="task-list" class="task-list"></div>
        </section>
      </main>
    </div>

    <template id="task-template">
      <article class="task-item">
        <label class="task-check">
          <input class="task-completed" type="checkbox" />
          <span></span>
        </label>
        <div class="task-content">
          <input class="task-title-input" type="text" maxlength="80" />
          <textarea class="task-description-input" maxlength="300"></textarea>
          <p class="task-meta"></p>
        </div>
        <div class="task-actions">
          <button class="save-task" type="button">Save</button>
          <button class="delete-task danger" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
